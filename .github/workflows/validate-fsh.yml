name: Validate FSH Files

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'LMDI/input/fsh/**'
      - 'LMDI/sushi-config.yaml'

env:
  IG: LMDI
  NO_BASIS_VERSION: 2.2.0  # Sentraliser versjonshåndtering

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install fsh-sushi
      run: npm install -g fsh-sushi

    - name: Install FHIR packages including no-basis
      run: |
        NO_BASIS_TGZ="hl7.fhir.no.basis-${{ env.NO_BASIS_VERSION }}-snapshots.tgz"

        echo "📦 Installing no-basis ${{ env.NO_BASIS_VERSION }} snapshot"
        if [ -f "$NO_BASIS_TGZ" ]; then
          echo "Using local no-basis package"
        else
          echo "Downloading no-basis from GitHub"
          curl -L -o "$NO_BASIS_TGZ" \
            https://raw.githubusercontent.com/HL7Norway/resources/main/snapshots/$NO_BASIS_TGZ
        fi

        echo "📦 Installing FHIR R4 core 4.0.1"
        npm --registry https://packages.simplifier.net install hl7.fhir.r4.core@4.0.1

        npm install "$NO_BASIS_TGZ"
        
        echo "📁 Creating FHIR package cache directory"
        mkdir -p $HOME/.fhir/packages/hl7.fhir.no.basis#${{ env.NO_BASIS_VERSION }}/package
        
        echo "📋 Copying no-basis to package cache"
        cp -r ./node_modules/hl7.fhir.no.basis/* $HOME/.fhir/packages/hl7.fhir.no.basis#${{ env.NO_BASIS_VERSION }}/package
        
        echo "✅ Package installation complete"

    - name: Install fsh-validator
      run: pip install -U git+https://github.com/glichtner/fsh-validator

    - name: Run fsh-validator
      continue-on-error: true
      run: |
        cd ${{ env.IG }}
        fsh-validator --all
        
    - name: Run SUSHI compilation test
      run: |
        cd ${{ env.IG }}
        sushi .
        if [ $? -eq 0 ]; then
          echo "✅ SUSHI compilation successful"
        else
          echo "❌ SUSHI compilation failed"
          exit 1
        fi
